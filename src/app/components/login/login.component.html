<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h2>🏭 Gestion des Stocks</h2>
      <p>Système Multi-Entrepôts</p>
    </div>

    <div class="login-body">

      <div *ngIf="erreur" class="alert alert-danger">
        {{ erreur }}
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="email"
          placeholder="admin@stock.tn"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="motDePasse"
          placeholder="••••••••"
          (keyup.enter)="login()"
        />
      </div>

      <button
        class="btn btn-primary w-100"
        (click)="login()"
        [disabled]="chargement">
        <span *ngIf="chargement">Connexion en cours...</span>
        <span *ngIf="!chargement">Se connecter</span>
      </button>

    </div>
  </div>
</div>
